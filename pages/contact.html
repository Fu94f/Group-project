<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="/styles/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/372bf40e06.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- HEADER -->
    <header>
        <div class="header__container">
 
            <img src="/images/Logo-ETI.png" alt="logo" class="header__logo">

            <ul class="navbar">
                <li class="navbar__item" id="navbar__home"><a href="/pages/home.html">Home</a></li>
                <li class="navbar__item" id="navbar__about"><a href="/pages/about.html">About</a></li>
                <li class="navbar__item" id="navbar__Gallery"><a href="/pages/gallery.html">Gallery</a></li>
                <li class="navbar__item" id="navbar__Contact"><a href="/pages/contact.html">Contact</a></li>
            </ul>

            <div class="header__btns">
                <button class="header__btn__subscribe">Subscribe</button>
                <button class="header__btn__log-in">Log in</button>
            </div>
        </div>
    </header>
    <!--  -->

     <!-- FORM -->
     <main class="form__container">
        <form action="">
            <h2 class="contact-us">Contact us!</h2>
        <!-- name -->
         <div class="container__input-field-name">
            <label for="first-name" class="label">Your name</label>
            <br>
            <input type="text" placeholder="First name" id="first-name" class="input-field-name" required autofocus>
            <input type="text" placeholder="Last name" class="input-field-name input-field-lastName">
            <br>
        </div>
        <!-- email -->
            <label for="email" class="label">Your email</label>
            <br>
            <input type="email" placeholder="eg.example@email.com" id="email" class="input-field" required>
            <br>
        <!-- message -->
            <label for="message">Your message</label>
            <br>
            <textarea name="message" placeholder="Message" required maxlength="400" rows="10" id="message" class="input-field"></textarea>
            <br>
        <!-- button -->
            <button type="submit" class="btn__submit">Submit</button>
        </form>
    </main>
    <!--  -->   

    <!-- FOOTER -->
    <footer>
        <div class="footer__container">
            <img src="/images/Logo-ETI.png" alt="logo" class="footer__logo">
                
            <ul class="footer__navbar">
                <li class="footer__navbar__item"><a href="/pages/home.html">Home</a></li>
                <li class="footer__navbar__item"><a href="/pages/about.html">About</a></li>
                <li class="footer__navbar__item"><a href="/pages/gallery.html">Gallery</a></li>
                <li class="footer__navbar__item"><a href="/pages/contact.html">Contact</a></li>
            </ul>

            <div class="footer__follow-us">
                <p>Follow us on social media!</p>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-facebook"></i>
            </div>
        </div>
    </footer>
    <!--  -->
</body>
</html>
